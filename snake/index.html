<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="贪吃蛇">
<title>贪吃蛇 Plus</title>
<link rel="manifest" href="./manifest.json">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  :root{
    --bg:#1a1a2e; --panel:#16213e; --accent:#4ecca3; --accent2:#36b390;
    --food:#e94560; --gold:#ffd166; --speed:#5b9dff; --shrink:#c77dff;
    --double:#ff9f43; --wall:#46476b; --poison:#7a5230; --mirror:#dfe6e9;
  }
  body{
    background:radial-gradient(circle at 50% 0%, #232347, var(--bg));
    color:#fff; font-family:-apple-system,"Segoe UI",sans-serif;
    display:flex; flex-direction:column; align-items:center;
    min-height:100vh; padding:12px; touch-action:none; user-select:none;
  }
  h1{ font-size:22px; margin:6px 0 10px; letter-spacing:1px; }
  .stats{ display:flex; gap:8px; margin-bottom:10px; width:100%; max-width:400px; }
  .stat{ flex:1; background:var(--panel); border-radius:10px; padding:8px 4px; text-align:center; border:1px solid rgba(78,204,163,.2); }
  .stat .label{ font-size:11px; color:#8a8ab0; }
  .stat .val{ font-size:19px; font-weight:700; color:var(--accent); margin-top:2px; }
  .stat .val.gold{ color:var(--gold); }
  .wrap{ position:relative; }
  canvas{ background:var(--panel); border:2px solid var(--accent); border-radius:10px; max-width:92vw; max-height:56vh; touch-action:none; display:block; }
  #combo{ position:absolute; top:8px; right:10px; font-size:13px; font-weight:700; color:var(--gold); opacity:0; transition:.2s; pointer-events:none; }
  #combo.show{ opacity:1; }
  #fx{ position:absolute; top:8px; left:10px; font-size:13px; font-weight:700; opacity:0; transition:.2s; pointer-events:none; }
  #fx.show{ opacity:1; }
  .controls{ display:flex; gap:8px; margin-top:12px; flex-wrap:wrap; justify-content:center; }
  button{ background:var(--panel); color:#fff; border:1px solid rgba(78,204,163,.4); border-radius:10px; padding:10px 16px; font-size:15px; cursor:pointer; transition:.15s; }
  button:active{ transform:scale(.95); }
  button.primary{ background:var(--accent); color:#08251c; font-weight:700; border:none; }
  #installBtn{ display:none; border-color:var(--gold); color:var(--gold); }
  #tip{ margin-top:12px; font-size:12px; color:#777; text-align:center; max-width:380px; }
  .legend{ display:flex; gap:10px; margin-top:8px; font-size:11px; color:#9a9ac0; flex-wrap:wrap; justify-content:center; max-width:400px; }
  .legend span{ display:flex; align-items:center; gap:4px; }
  .dot{ width:10px; height:10px; border-radius:3px; display:inline-block; }
  .overlay{ position:fixed; inset:0; background:rgba(10,10,25,.9); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; z-index:10; overflow:auto; }
  .overlay.hidden{ display:none; }
  .card{ background:var(--panel); border-radius:16px; padding:24px; width:100%; max-width:360px; border:1px solid rgba(78,204,163,.25); box-shadow:0 10px 40px rgba(0,0,0,.5); }
  .card h2{ text-align:center; margin-bottom:4px; font-size:24px; }
  .card .sub{ text-align:center; color:#8a8ab0; font-size:13px; margin-bottom:18px; }
  .seg{ display:flex; gap:6px; margin-bottom:16px; flex-wrap:wrap; }
  .seg button{ flex:1; min-width:60px; padding:9px 0; font-size:13px; border:1px solid rgba(78,204,163,.3); background:transparent; }
  .seg button.active{ background:var(--accent); color:#08251c; font-weight:700; border:none; }
  .field-label{ font-size:12px; color:#8a8ab0; margin-bottom:7px; }
  .btn-full{ width:100%; padding:14px; font-size:17px; margin-top:4px; }
  .history{ margin-top:16px; }
  .history h3{ font-size:13px; color:#8a8ab0; margin-bottom:8px; }
  .hlist{ list-style:none; font-size:13px; max-height:130px; overflow:auto; }
  .hlist li{ display:flex; justify-content:space-between; padding:6px 8px; border-radius:6px; background:rgba(255,255,255,.03); margin-bottom:5px; }
  .hlist .hd{ color:#8a8ab0; }
  .hlist .hs{ color:var(--accent); font-weight:600; }
  .empty{ color:#666; font-size:12px; text-align:center; padding:10px; }
  .link{ color:#777; font-size:12px; text-decoration:underline; cursor:pointer; margin-top:8px; display:inline-block; }
  input.name{ width:100%; padding:10px; border-radius:8px; border:1px solid rgba(78,204,163,.4); background:#0e1730; color:#fff; font-size:15px; margin-bottom:12px; text-align:center; }
  .toast{ position:fixed; top:18px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,.85); padding:8px 16px; border-radius:20px; font-size:13px; z-index:20; opacity:0; transition:.3s; pointer-events:none; }
  .toast.show{ opacity:1; }
</style>
</head>
<body>
  <h1>🐍 贪吃蛇 Plus</h1>

  <div class="stats">
    <div class="stat"><div class="label">得分</div><div class="val" id="score">0</div></div>
    <div class="stat"><div class="label">最高分</div><div class="val gold" id="best">0</div></div>
    <div class="stat" id="lvBox"><div class="label">关卡</div><div class="val" id="level">-</div></div>
    <div class="stat"><div class="label">模式</div><div class="val" id="modeLabel" style="font-size:14px">经典</div></div>
  </div>

  <div class="wrap">
    <canvas id="game" width="400" height="400"></canvas>
    <div id="combo"></div>
    <div id="fx"></div>
  </div>

  <div class="controls">
    <button id="pauseBtn">暂停</button>
    <button id="restartBtn">重开</button>
    <button id="menuBtn">菜单</button>
    <button id="installBtn">📲 安装</button>
  </div>

  <div class="legend">
    <span><i class="dot" style="background:var(--food)"></i>普通+1</span>
    <span><i class="dot" style="background:var(--speed)"></i>加速</span>
    <span><i class="dot" style="background:var(--shrink)"></i>缩短</span>
    <span><i class="dot" style="background:var(--double)"></i>双倍</span>
    <span><i class="dot" style="background:var(--poison)"></i>毒苹果(限时)</span>
    <span><i class="dot" style="background:var(--mirror)"></i>镜像(限时)</span>
    <span><i class="dot" style="background:var(--wall)"></i>障碍</span>
  </div>
  <div id="tip">方向键 / WASD / 手机滑动控制，空格暂停。限时道具会闪烁后消失！</div>

  <div class="overlay" id="menu">
    <div class="card">
      <h2>贪吃蛇 Plus</h2>
      <div class="sub">选择模式与难度</div>
      <div class="field-label">游戏模式</div>
      <div class="seg" id="modeSeg">
        <button data-m="classic" class="active">经典</button>
        <button data-m="level">闯关</button>
      </div>
      <div class="field-label">难度</div>
      <div class="seg" id="diffSeg">
        <button data-d="easy">简单</button>
        <button data-d="normal" class="active">普通</button>
        <button data-d="hard">困难</button>
        <button data-d="hell">地狱</button>
      </div>
      <div class="field-label">穿墙（仅经典）</div>
      <div class="seg" id="wallSeg">
        <button data-w="0" class="active">关</button>
        <button data-w="1">开</button>
      </div>
      <button class="primary btn-full" id="startBtn">开始游戏</button>
      <div class="history">
        <h3>排行榜 / 最近记录</h3>
        <ul class="hlist" id="hlist"></ul>
        <span class="link" id="clearBtn">清除记录</span>
      </div>
    </div>
  </div>

  <div class="overlay hidden" id="gameover">
    <div class="card">
      <h2 id="goTitle">游戏结束</h2>
      <div class="sub" id="goSub">得分 0</div>
      <div id="nameBox" style="display:none">
        <div class="field-label">🎉 新纪录！留下你的名字</div>
        <input class="name" id="nameInput" maxlength="8" placeholder="无名英雄">
      </div>
      <button class="primary btn-full" id="againBtn">再来一局</button>
      <button class="btn-full" id="backBtn" style="margin-top:8px">返回菜单</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script>
const canvas=document.getElementById('game'), ctx=canvas.getContext('2d');
const $=id=>document.getElementById(id);
const GRID=20, CELLS=canvas.width/GRID;
const rand=()=>Math.floor(Math.random()*CELLS);

const DIFF={ easy:{speed:160,name:'简单'}, normal:{speed:120,name:'普通'}, hard:{speed:85,name:'困难'}, hell:{speed:55,name:'地狱'} };
const KEY_BEST='snakeP3_best', KEY_HIST='snakeP3_history';

const COLORS={ normal:'#e94560', speed:'#5b9dff', shrink:'#c77dff', double:'#ff9f43', poison:'#7a5230', mirror:'#dfe6e9' };
const TIMED_LIFE=7000;   // 限时道具存活毫秒
const TIMED_MAX=2;       // 场上限时道具上限

let snake,dir,nextDir,walls,score,timer,running,paused;
let mainFood, timedFoods, nextTimedAt;
let curDiff='normal', curMode='classic', wrapWall=false;
let level=1, baseSpeed=120, curSpeed=120, eatenInLevel=0, needPerLevel=5;
let lastEatTime=0, combo=0, speedBoostUntil=0, mirrorUntil=0;

// ---------- 音效 ----------
let actx=null;
function beep(f,dur=0.08,type='square',vol=0.15){ try{ if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)(); const o=actx.createOscillator(),g=actx.createGain(); o.type=type;o.frequency.value=f;o.connect(g);g.connect(actx.destination); g.gain.setValueAtTime(vol,actx.currentTime); g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+dur); o.start();o.stop(actx.currentTime+dur);}catch(e){} }
const sEat=()=>beep(660,0.07), sSpecial=()=>{beep(880,0.06);setTimeout(()=>beep(1180,0.08),60);};
const sBad=()=>beep(160,0.15,'sawtooth'), sDie=()=>{beep(200,0.18,'sawtooth');setTimeout(()=>beep(120,0.25,'sawtooth'),120);};
const sLevel=()=>{beep(523,0.1);setTimeout(()=>beep(659,0.1),100);setTimeout(()=>beep(784,0.15),200);};

// ---------- 存储 ----------
const getBest=()=>+(localStorage.getItem(KEY_BEST)||0);
const setBest=v=>localStorage.setItem(KEY_BEST,v);
function getHist(){ try{return JSON.parse(localStorage.getItem(KEY_HIST)||'[]');}catch{return[];} }
function addHist(e){ const h=getHist(); h.unshift(e); h.sort((a,b)=>b.score-a.score); localStorage.setItem(KEY_HIST,JSON.stringify(h.slice(0,10))); }

function refreshStatsUI(){ $('best').textContent=getBest(); $('modeLabel').textContent=curMode==='level'?'闯关':'经典'; $('lvBox').style.display=curMode==='level'?'':'none'; $('level').textContent=level; }
function renderHistory(){ const h=getHist(); if(!h.length){ $('hlist').innerHTML='<div class="empty">还没有记录，快玩一局吧</div>'; return; } $('hlist').innerHTML=h.map((e,i)=>{ const m=i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}.`; return `<li><span class="hd">${m} ${e.name||'匿名'} · ${e.mode}${e.level?(' L'+e.level):''}</span><span class="hs">${e.score} 分</span></li>`; }).join(''); }
function toast(msg){ const t=$('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),1200); }
function showFx(txt,color){ const f=$('fx'); f.textContent=txt; f.style.color=color; f.classList.add('show'); clearTimeout(f._t); f._t=setTimeout(()=>f.classList.remove('show'),900); }
function showCombo(){ const c=$('combo'); c.textContent=`连击 x${combo} +${combo-2}`; c.classList.add('show'); clearTimeout(c._t); c._t=setTimeout(()=>c.classList.remove('show'),900); }

// ---------- 关卡障碍 ----------
function buildWalls(lv){
  const w=[]; if(curMode!=='level') return w;
  const add=(x,y)=>{ if(x>=0&&x<CELLS&&y>=0&&y<CELLS) w.push({x,y}); };
  const mid=Math.floor(CELLS/2);
  if(lv>=2){ for(let i=4;i<CELLS-4;i++) add(i,mid); }
  if(lv>=3){ for(let i=4;i<CELLS-4;i++) add(mid,i); }
  if(lv>=4){ for(let i=2;i<6;i++){ add(i,i); add(CELLS-1-i,i); add(i,CELLS-1-i); add(CELLS-1-i,CELLS-1-i);} }
  if(lv>=5){ for(let i=0;i<CELLS;i+=3){ add(i,2); add(CELLS-1-i,CELLS-3);} }
  return w.filter(p=>!(Math.abs(p.x-mid)<=1 && Math.abs(p.y-mid)<=1));
}

// ---------- 食物系统 ----------
function occupied(x,y){
  if(snake.some(s=>s.x===x&&s.y===y)) return true;
  if(walls.some(w=>w.x===x&&w.y===y)) return true;
  if(mainFood && mainFood.x===x && mainFood.y===y) return true;
  if(timedFoods.some(f=>f.x===x&&f.y===y)) return true;
  return false;
}
function freeCell(){ let x,y,g=0; do{ x=rand(); y=rand(); g++; } while(occupied(x,y)&&g<800); return {x,y}; }

// 主食物：场上永远保持一个，吃掉立即生成下一个。类型为不限时的 normal/speed/shrink/double
function spawnMain(){
  mainFood=null; // 先清空，避免占位检测把旧格当障碍
  const r=Math.random();
  const type = r<0.65 ? 'normal' : r<0.78 ? 'speed' : r<0.88 ? 'shrink' : 'double';
  mainFood={ ...freeCell(), type };
}
// 限时道具：独立定时生成，可与主食物并存，过期自动消失
function spawnTimed(){
  if(timedFoods.length>=TIMED_MAX) return;
  const type = Math.random()<0.6 ? 'poison' : 'mirror';
  timedFoods.push({ ...freeCell(), type, expire:Date.now()+TIMED_LIFE });
}
function scheduleTimed(){ nextTimedAt=Date.now()+5000+Math.random()*5000; }

// ---------- 游戏循环 ----------
function reset(){
  snake=[{x:8,y:10},{x:7,y:10},{x:6,y:10}];
  dir={x:1,y:0}; nextDir={x:1,y:0};
  score=0; combo=0; speedBoostUntil=0; mirrorUntil=0;
  $('score').textContent='0';
  if(curMode==='level'){ level=1; eatenInLevel=0; walls=buildWalls(level); } else { walls=[]; }
  baseSpeed=DIFF[curDiff].speed; curSpeed=baseSpeed;
  mainFood=null; timedFoods=[]; spawnMain(); scheduleTimed();
}
function restartTimer(){ clearInterval(timer); timer=setInterval(step,curSpeed); }

function step(){
  if(paused) return;
  const now=Date.now();
  // 加速到期恢复
  if(speedBoostUntil && now>speedBoostUntil){ speedBoostUntil=0; curSpeed=baseSpeed; restartTimer(); return; }
  // 清除过期限时道具
  timedFoods=timedFoods.filter(f=>now<f.expire);
  // 到点生成新的限时道具
  if(now>=nextTimedAt){ spawnTimed(); scheduleTimed(); }

  dir=nextDir;
  let nx=snake[0].x+dir.x, ny=snake[0].y+dir.y;
  if(wrapWall&&curMode==='classic'){ nx=(nx+CELLS)%CELLS; ny=(ny+CELLS)%CELLS; }
  else if(nx<0||nx>=CELLS||ny<0||ny>=CELLS) return die();
  const head={x:nx,y:ny};
  if(snake.some(s=>s.x===head.x&&s.y===head.y)) return die();
  if(walls.some(w=>w.x===head.x&&w.y===head.y)) return die();

  snake.unshift(head);

  if(mainFood && head.x===mainFood.x && head.y===mainFood.y){
    applyFood(mainFood);
    spawnMain();                       // 主食物被吃，立即生成下一个
  } else {
    const ti=timedFoods.findIndex(f=>f.x===head.x&&f.y===head.y);
    if(ti>=0){ applyFood(timedFoods[ti]); timedFoods.splice(ti,1); }
    else { snake.pop(); }              // 没吃到，正常移动
  }
  draw();
}

// 处理某个食物的效果。注意：调用前已 unshift 头部（默认 +1 长度）
function applyFood(f){
  const now=Date.now();
  const countsCombo = f.type!=='poison';
  if(countsCombo){ combo=(now-lastEatTime<1500)?combo+1:1; lastEatTime=now; }
  else combo=0;
  const bonus = (countsCombo && combo>=3) ? combo-2 : 0;

  let gain=1, countsLevel=true, popExtra=0;
  switch(f.type){
    case 'double': gain=2; sSpecial(); toast('双倍得分 +2'); break;
    case 'speed':  sSpecial(); toast('加速！'); curSpeed=Math.max(35,baseSpeed*0.6); speedBoostUntil=now+4000; restartTimer(); break;
    case 'shrink': sSpecial(); toast('缩短'); popExtra=4; break;                 // 净 -3 长度
    case 'poison': gain=-3; countsLevel=false; sBad(); toast('💀 毒苹果 -3'); showFx('毒！','#c8a36a'); popExtra=3; break; // 扣分+缩短
    case 'mirror': sBad(); toast('🪞 镜像反转！'); showFx('镜像','#dfe6e9'); mirrorUntil=now+5000; break;
    default:       sEat();
  }

  score=Math.max(0, score + gain + (gain>0?bonus:0));
  $('score').textContent=score;
  for(let i=0;i<popExtra && snake.length>3;i++) snake.pop();
  if(bonus>0 && gain>0) showCombo();

  if(curMode==='level' && countsLevel){ eatenInLevel++; if(eatenInLevel>=needPerLevel) nextLevel(); }
}

function nextLevel(){
  level++; eatenInLevel=0; walls=buildWalls(level);
  baseSpeed=Math.max(45, DIFF[curDiff].speed - level*6); curSpeed=baseSpeed; speedBoostUntil=0;
  // 食物若落在新墙上则重新生成
  if(mainFood && walls.some(w=>w.x===mainFood.x&&w.y===mainFood.y)) spawnMain();
  timedFoods=timedFoods.filter(f=>!walls.some(w=>w.x===f.x&&w.y===f.y));
  $('level').textContent=level; sLevel(); toast(`进入第 ${level} 关！`); restartTimer();
}

// ---------- 渲染 ----------
function draw(){
  const now=Date.now();
  const mirror = mirrorUntil && now<mirrorUntil;
  ctx.fillStyle=mirror?'#1e2540':'#16213e'; ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle='rgba(255,255,255,0.04)'; ctx.lineWidth=1;
  for(let i=1;i<CELLS;i++){ ctx.beginPath();ctx.moveTo(i*GRID,0);ctx.lineTo(i*GRID,canvas.height);ctx.stroke(); ctx.beginPath();ctx.moveTo(0,i*GRID);ctx.lineTo(canvas.width,i*GRID);ctx.stroke(); }

  // 障碍
  ctx.fillStyle=COLORS.wall||'#46476b';
  walls.forEach(w=>{ ctx.fillStyle='#46476b'; roundRect(w.x*GRID+1,w.y*GRID+1,GRID-2,GRID-2,3); });

  // 主食物
  if(mainFood) drawFood(mainFood);

  // 限时道具：快过期时闪烁
  timedFoods.forEach(f=>{
    const left=f.expire-now;
    if(left<2000 && Math.floor(now/150)%2===0) return; // 闪烁
    drawFood(f);
  });

  // 蛇
  snake.forEach((s,i)=>{
    ctx.fillStyle=i===0?(speedBoostUntil?'#5b9dff':(mirror?'#dfe6e9':'#4ecca3')):'#36b390';
    roundRect(s.x*GRID+1,s.y*GRID+1,GRID-2,GRID-2,3);
    if(i===0){ ctx.fillStyle='#08251c'; const ex=s.x*GRID,ey=s.y*GRID; ctx.fillRect(ex+5,ey+5,3,3); ctx.fillRect(ex+GRID-8,ey+5,3,3); }
  });
  if(mirror){ ctx.fillStyle='rgba(223,230,233,0.06)'; ctx.fillRect(0,0,canvas.width,canvas.height); }
}
function drawFood(f){
  ctx.fillStyle=COLORS[f.type];
  const pulse=f.type!=='normal'?Math.sin(Date.now()/150)*1.5:0;
  roundRect(f.x*GRID+2-pulse, f.y*GRID+2-pulse, GRID-4+pulse*2, GRID-4+pulse*2, 4);
  if(f.type==='poison'){ ctx.fillStyle='#3a2410'; ctx.fillRect(f.x*GRID+9,f.y*GRID+4,2,5); }
}
function roundRect(x,y,w,h,r){ ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.fill(); }

// ---------- 结束 / 流程 ----------
let pendingEntry=null;
function fmtDate(){ const d=new Date(); return `${d.getMonth()+1}/${d.getDate()}`; }
function die(){
  clearInterval(timer); running=false; sDie();
  const best=getBest(); const isNew=score>best; if(isNew) setBest(score);
  $('goTitle').textContent=isNew?'🎉 新纪录！':'游戏结束';
  $('goSub').textContent=`得分 ${score}　最高 ${getBest()}${curMode==='level'?'　第 '+level+' 关':''}`;
  $('nameBox').style.display=isNew?'block':'none'; if(isNew) $('nameInput').value='';
  pendingEntry={ score, mode:curMode==='level'?'闯关':'经典', level:curMode==='level'?level:0, date:fmtDate(), name:'' };
  refreshStatsUI(); $('gameover').classList.remove('hidden');
}
function commitEntry(){ if(!pendingEntry) return; if($('nameBox').style.display!=='none') pendingEntry.name=($('nameInput').value.trim()||'无名英雄'); addHist(pendingEntry); pendingEntry=null; }

function startGame(){ if(actx&&actx.state==='suspended') actx.resume(); reset(); running=true; paused=false; $('pauseBtn').textContent='暂停'; $('menu').classList.add('hidden'); $('gameover').classList.add('hidden'); refreshStatsUI(); draw(); restartTimer(); }
function togglePause(){ if(!running) return; paused=!paused; $('pauseBtn').textContent=paused?'继续':'暂停'; }
function openMenu(){ commitEntry(); clearInterval(timer); running=false; renderHistory(); refreshStatsUI(); $('gameover').classList.add('hidden'); $('menu').classList.remove('hidden'); }
function setDir(x,y){ if(mirrorUntil&&Date.now()<mirrorUntil){ x=-x; y=-y; } if(dir.x===-x&&dir.y===-y) return; if(dir.x===x&&dir.y===y) return; nextDir={x,y}; }

// ---------- 控制 ----------
document.addEventListener('keydown',e=>{
  const map={ArrowUp:[0,-1],ArrowDown:[0,1],ArrowLeft:[-1,0],ArrowRight:[1,0],w:[0,-1],s:[0,1],a:[-1,0],d:[1,0],W:[0,-1],S:[0,1],A:[-1,0],D:[1,0]};
  if(e.key===' '){ e.preventDefault(); togglePause(); return; }
  if(map[e.key]){ e.preventDefault(); setDir(...map[e.key]); }
});
let touchStart=null;
canvas.addEventListener('touchstart',e=>{ touchStart={x:e.touches[0].clientX,y:e.touches[0].clientY}; },{passive:true});
canvas.addEventListener('touchmove',e=>{ if(!touchStart)return; const dx=e.touches[0].clientX-touchStart.x,dy=e.touches[0].clientY-touchStart.y; if(Math.abs(dx)<18&&Math.abs(dy)<18)return; if(Math.abs(dx)>Math.abs(dy)) setDir(dx>0?1:-1,0); else setDir(0,dy>0?1:-1); touchStart=null; },{passive:true});

$('modeSeg').addEventListener('click',e=>{ const b=e.target.closest('button'); if(!b)return; curMode=b.dataset.m; [...e.currentTarget.children].forEach(c=>c.classList.toggle('active',c===b)); $('wallSeg').style.opacity=curMode==='classic'?'1':'.4'; refreshStatsUI(); });
$('diffSeg').addEventListener('click',e=>{ const b=e.target.closest('button'); if(!b)return; curDiff=b.dataset.d; [...e.currentTarget.children].forEach(c=>c.classList.toggle('active',c===b)); });
$('wallSeg').addEventListener('click',e=>{ const b=e.target.closest('button'); if(!b)return; wrapWall=b.dataset.w==='1'; [...e.currentTarget.children].forEach(c=>c.classList.toggle('active',c===b)); });
$('startBtn').addEventListener('click',startGame);
$('againBtn').addEventListener('click',()=>{ commitEntry(); startGame(); });
$('backBtn').addEventListener('click',openMenu);
$('pauseBtn').addEventListener('click',togglePause);
$('restartBtn').addEventListener('click',()=>{ commitEntry(); startGame(); });
$('menuBtn').addEventListener('click',openMenu);
$('clearBtn').addEventListener('click',()=>{ localStorage.removeItem(KEY_HIST); renderHistory(); });

// 让限时道具脉动/闪烁动画持续刷新
setInterval(()=>{ if(running&&!paused) draw(); },100);

// ---------- PWA ----------
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{ e.preventDefault(); deferredPrompt=e; $('installBtn').style.display='inline-block'; });
$('installBtn').addEventListener('click',async()=>{ if(!deferredPrompt){ toast('浏览器菜单里选「添加到主屏幕」'); return; } deferredPrompt.prompt(); await deferredPrompt.userChoice; deferredPrompt=null; $('installBtn').style.display='none'; });
window.addEventListener('appinstalled',()=>{ $('installBtn').style.display='none'; toast('已安装到桌面'); });
if('serviceWorker' in navigator){ window.addEventListener('load',()=>{ navigator.serviceWorker.register('./sw.js').catch(()=>{}); }); }

refreshStatsUI(); renderHistory(); draw();
</script>
</body>
</html>
